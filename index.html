<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Card</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 350px; }
        h1 { color: #333; }
        p { color: #666; }
        .links a { display: block; margin: 10px 0; padding: 10px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
        .links a:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>[XxXxX]</h1>
        <p>Tech Enthusiast | Git & GitHub Learner</p>
        <hr>
        <div class="links">
            <a href="https://github.com" target="_blank">My GitHub</a>
            <a href="https://linkedin.com" target="_blank">My LinkedIn</a>
            <a href="mailto:your-email@example.com">Email Me</a>
        </div>
    </div>

</body>
</html>
